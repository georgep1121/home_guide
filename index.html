<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Δίγλωσσο Site</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <button onclick="setLang('el')">Ελληνικά</button>
  <button onclick="setLang('en')">English</button>

  <!-- ΕΛΛΗΝΙΚΑ -->
  <div id="el">
    <h1>Καλώς ήρθες</h1>
    <p>Αυτό είναι το ελληνικό περιεχόμενο της σελίδας.</p>
  </div>

  <!-- ΑΓΓΛΙΚΑ -->
  <div id="en" style="display:none;">
    <h1>Welcome</h1>
    <p>This is the English content of the page.</p>
  </div>

  <script>
    function setLang(lang) {
      document.getElementById('el').style.display = (lang === 'el') ? 'block' : 'none';
      document.getElementById('en').style.display = (lang === 'en') ? 'block' : 'none';
    }
  </script>

</body>
</html>
