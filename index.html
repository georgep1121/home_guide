<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Οδηγός Σπιτιού & Εργασιών</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

/* Desktop Layout */
.container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.column{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    min-height:350px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.column h2{
    text-align:center;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:2px solid #eee;
}

/* Mobile Tabs */
.mobile-tabs{
    display:none;
}

.tab-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-bottom:10px;
}

.tab-buttons button{
    flex:1;
    padding:10px;
    border:none;
    background:#ddd;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.tab-buttons button.active{
    background:#444;
    color:white;
}

.tab-content{
    display:none;
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    min-height:300px;
}

.tab-content.active{
    display:block;
}

/* Mobile */
@media (max-width: 768px){

    .container{
        display:none;
    }

    .mobile-tabs{
        display:block;
    }
}
</style>
</head>
<body>

<h1>Οδηγός Σπιτιού & Εργασιών</h1>

<!-- Desktop -->
<div class="container">

    <div class="column">
        <h2>Περιβάλλων Χώρος</h2>
    </div>

    <div class="column">
        <h2>Κάτω Επίπεδο</h2>
    </div>

    <div class="column">
        <h2>Επάνω Επίπεδο</h2>
    </div>

    <div class="column">
        <h2>Υποδομές</h2>
    </div>

</div>

<!-- Mobile -->
<div class="mobile-tabs">

    <div class="tab-buttons">
        <button class="active" onclick="showTab(0)">Περιβάλλων Χώρος</button>
        <button onclick="showTab(1)">Κάτω Επίπεδο</button>
        <button onclick="showTab(2)">Επάνω Επίπεδο</button>
        <button onclick="showTab(3)">Υποδομές</button>
    </div>

    <div class="tab-content active">
        <h2>Περιβάλλων Χώρος</h2>
    </div>

    <div class="tab-content">
        <h2>Κάτω Επίπεδο</h2>
    </div>

    <div class="tab-content">
        <h2>Επάνω Επίπεδο</h2>
    </div>

    <div class="tab-content">
        <h2>Υποδομές</h2>
    </div>

</div>

<script>
function showTab(index){

    const tabs = document.querySelectorAll('.tab-content');
    const buttons = document.querySelectorAll('.tab-buttons button');

    tabs.forEach(tab => tab.classList.remove('active'));
    buttons.forEach(btn => btn.classList.remove('active'));

    tabs[index].classList.add('active');
    buttons[index].classList.add('active');
}
</script>

</body>
</html>
